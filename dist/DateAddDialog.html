<!doctype html>
<html>
  <head>
    <base target="_top" />
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 12px;
      }
      label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
        font-size: 13px;
      }
      input {
        width: 100%;
        padding: 6px;
        margin-top: 4px;
        box-sizing: border-box;
      }
      .actions {
        margin-top: 16px;
        text-align: right;
      }
      button {
        padding: 8px 16px;
        margin-left: 8px;
        cursor: pointer;
      }
      #submit-btn {
        background: #4285f4;
        color: #fff;
        border: none;
        border-radius: 4px;
      }
      #submit-btn:disabled {
        background: #ccc;
      }
      #cancel-btn {
        background: #f1f1f1;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      #error {
        color: #d93025;
        font-size: 12px;
        margin-top: 8px;
        display: none;
      }
    </style>
  </head>
  <body>
    <label for="date-input">Rehearsal Date</label>
    <input type="date" id="date-input" />

    <label for="time-input">Start Time</label>
    <input type="time" id="time-input" />

    <div id="error"></div>

    <div class="actions">
      <button id="cancel-btn" onclick="google.script.host.close()">Cancel</button>
      <button id="submit-btn" onclick="submitForm()">Add Date</button>
    </div>

    <script>
      // Set defaults from server-side template
      (function () {
        // Default date: today in YYYY-MM-DD
        var today = new Date();
        var yyyy = today.getFullYear();
        var mm = String(today.getMonth() + 1).padStart(2, '0');
        var dd = String(today.getDate()).padStart(2, '0');
        document.getElementById('date-input').value = yyyy + '-' + mm + '-' + dd;

        // Default time from server template property
        var defaultTime = <?!= JSON.stringify(defaultTime) ?>;
        document.getElementById('time-input').value = defaultTime;
      })();

      function submitForm() {
        var dateVal = document.getElementById('date-input').value;
        var timeVal = document.getElementById('time-input').value;
        var errorEl = document.getElementById('error');

        if (!dateVal || !timeVal) {
          errorEl.textContent = 'Please enter both a date and time.';
          errorEl.style.display = 'block';
          return;
        }

        errorEl.style.display = 'none';
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('submit-btn').textContent = 'Adding...';

        google.script.run
          .withSuccessHandler(function () {
            google.script.host.close();
          })
          .withFailureHandler(function (err) {
            errorEl.textContent = err.message || 'An error occurred.';
            errorEl.style.display = 'block';
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').textContent = 'Add Date';
          })
          .insertRehearsalDate(dateVal, timeVal);
      }
    </script>
  </body>
</html>
